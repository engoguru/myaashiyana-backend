name: Backend-ERP

on:
  push:
    branches:
       - main

jobs:

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/erp-backend:${{ github.sha }} .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/erp-backend:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: self-hosted

    steps:
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Pull Latest Docker Image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/erp-backend:${{ github.sha }}

      - name: Remove Old Container
        run: |
          if [ "$(docker ps -aq -f name=erp-backend-service)" ]; then
            docker rm -f erp-backend-service
          fi

      - name: Run New Docker Container
        run: |
          docker run -d \
            -p ${{ secrets.PORT }}:${{ secrets.PORT }} \
            --name erp-backend-service \
            --restart unless-stopped \
            -e API_KEY=${{ secrets.API_KEY }} \
            -e API_SECRET=${{ secrets.API_SECRET }} \
            -e CLOUD_NAME=${{ secrets.CLOUD_NAME }} \
            -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
            -e MONGODB_URL=${{ secrets.MONGODB_URL }} \
            -e NODE_MODE=${{ secrets.NODE_MODE }} \
            -e PORT=${{ secrets.PORT }} \
            -e RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }} \
            -e RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }} \
            -e RAZORPAY_WEBHOOK_SECRET=${{ secrets.RAZORPAY_WEBHOOK_SECRET }} \
            ${{ secrets.DOCKER_USERNAME }}/erp-backend:${{ github.sha }}